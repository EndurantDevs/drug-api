name: PR Target Branch Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-target:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Keep target branch label accurate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const label = 'wrong-base';
            const body = 'This repository expects pull requests to target `main`. Please retarget this PR before review.';
            if (pr.base.ref === 'main') {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              return;
            }
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'D73A4A',
                description: 'Pull request targets the wrong base branch'
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [label]
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });
            if (comments.some((comment) => comment.body === body)) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
