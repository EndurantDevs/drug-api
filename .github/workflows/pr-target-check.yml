name: PR Target Branch Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-target:
    if: github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Label and comment on wrong target branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'wrong-base',
                color: 'D73A4A',
                description: 'Pull request targets the wrong base branch'
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['wrong-base']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: 'This repository expects pull requests to target `main`. Please retarget this PR before review.'
            });
