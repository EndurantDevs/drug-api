name: Publish dev image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push dev image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tag
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            tag="${{ inputs.image_tag }}"
          else
            ref="${GITHUB_REF_NAME//\//-}"
            tag="dev-${ref}-${GITHUB_SHA::8}-$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "image_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ghcr.io/endurantdevs/drug-api:${tag}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/endurantdevs/drug-api:${{ steps.image.outputs.image_tag }}
