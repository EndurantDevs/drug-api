[tool:pytest]
filterwarnings =
    error
    ignore::DeprecationWarning
asyncio_mode = auto
testpaths = tests
markers =
    e2e: End-to-end tests that require E2E_BASE_URL and a running API service.

[flake8]
max-line-length = 120
select = E9,F63,F7,F82
per-file-ignores =
    __init__.py:F401

[isort]
line_length = 120
skip = venv,venv313
