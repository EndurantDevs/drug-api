openapi: 3.0.3
info:
  title: Drugs API
  version: 1.1.0
  description: |
    Detailed OpenAPI definition for the Sanic Drugs API.
    All endpoints are read-only and are exposed under `/api/v1`.
    Label payloads may include `set_id` (SPL Set ID), which can be used with
    DailyMed media APIs for package photo lookup. Media URLs are not returned
    directly by this API.

servers:
  - url: http://127.0.0.1:8087
    description: Local e2e target
  - url: http://localhost:8080
    description: Docker/nginx local target

tags:
  - name: Healthcheck
    description: Service and database liveness
  - name: Drug
    description: Drug, package, label, search, and RxNorm endpoints

paths:
  /api/v1/healthcheck/:
    get:
      tags: [Healthcheck]
      operationId: getHealthcheck
      summary: Healthcheck status
      description: Returns service metadata and a lightweight DB connectivity check.
      responses:
        '200':
          description: Service and DB health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckStatus'
              examples:
                ok:
                  $ref: '#/components/examples/HealthcheckOk'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/:
    get:
      tags: [Drug]
      operationId: getDrugStatus
      summary: Drug API status
      description: Returns service metadata and row counts for product and package tables.
      responses:
        '200':
          description: Service metadata and counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugServiceStatus'
              examples:
                ok:
                  $ref: '#/components/examples/DrugStatusOk'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/ndc/{product_ndc}:
    get:
      tags: [Drug]
      operationId: getProductByNdc
      summary: Get product by product NDC
      parameters:
        - $ref: '#/components/parameters/ProductNdcParam'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              examples:
                product:
                  $ref: '#/components/examples/ProductExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/ndc/{product_ndc}/packages:
    get:
      tags: [Drug]
      operationId: getPackagesByProductNdc
      summary: Get packages by product NDC
      parameters:
        - $ref: '#/components/parameters/ProductNdcParam'
      responses:
        '200':
          description: Packages for a product. Unknown product NDC returns an empty array.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Package'
              examples:
                with_data:
                  $ref: '#/components/examples/PackageListExample'
                empty:
                  $ref: '#/components/examples/EmptyArrayExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/ndc/package/{package_ndc}:
    get:
      tags: [Drug]
      operationId: getPackageWithProductByPackageNdc
      summary: Get package by package NDC and embed related product
      parameters:
        - $ref: '#/components/parameters/PackageNdcParam'
      responses:
        '200':
          description: Package found with embedded product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageWithProduct'
              examples:
                package_with_product:
                  $ref: '#/components/examples/PackageWithProductExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/label/package/{package_ndc}:
    get:
      tags: [Drug]
      operationId: getLabelByPackageNdc
      summary: Get package + product and optional label by package NDC
      description: |
        Returns package and product data and, when available, a `label` object.
        If `label` is present, `label.set_id` can be used to resolve DailyMed
        media URLs externally.
      parameters:
        - $ref: '#/components/parameters/PackageNdcParam'
      responses:
        '200':
          description: Package and product found; label may be omitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageWithProductAndOptionalLabel'
              examples:
                with_label:
                  $ref: '#/components/examples/PackageWithProductAndLabelExample'
                without_label:
                  $ref: '#/components/examples/PackageWithProductExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/label/product/{product_ndc}:
    get:
      tags: [Drug]
      operationId: getLabelByProductNdc
      summary: Get product and optional label by product NDC
      description: |
        Returns product data and, when available, a `label` object.
        If `label` is present, `label.set_id` can be used to resolve DailyMed
        media URLs externally.
      parameters:
        - $ref: '#/components/parameters/ProductNdcParam'
      responses:
        '200':
          description: Product found; label may be omitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWithOptionalLabel'
              examples:
                with_optional_label:
                  $ref: '#/components/examples/ProductWithOptionalLabelExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/all:
    get:
      tags: [Drug]
      operationId: listProductsAll
      summary: List all products
      description: Returns a large product list with default pagination behavior.
      parameters:
        - $ref: '#/components/parameters/PrefixParam'
        - $ref: '#/components/parameters/SeparatorParam'
        - $ref: '#/components/parameters/SuffixParam'
      responses:
        '200':
          description: Product list page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/all/{page}:
    get:
      tags: [Drug]
      operationId: listProductsAllByPage
      summary: List all products by page
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PrefixParam'
        - $ref: '#/components/parameters/SeparatorParam'
        - $ref: '#/components/parameters/SuffixParam'
      responses:
        '200':
          description: Product list page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/all/{page}/{results_per_page}:
    get:
      tags: [Drug]
      operationId: listProductsAllByPageAndSize
      summary: List all products by page and page size
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/ResultsPerPageParam'
        - $ref: '#/components/parameters/PrefixParam'
        - $ref: '#/components/parameters/SeparatorParam'
        - $ref: '#/components/parameters/SuffixParam'
      responses:
        '200':
          description: Product list page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/{letter}:
    get:
      tags: [Drug]
      operationId: listProductsByLetter
      summary: List products by first letter
      parameters:
        - $ref: '#/components/parameters/LetterParam'
      responses:
        '200':
          description: Product list filtered by first letter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/{letter}/{page}:
    get:
      tags: [Drug]
      operationId: listProductsByLetterAndPage
      summary: List products by first letter and page
      parameters:
        - $ref: '#/components/parameters/LetterParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Product list filtered by first letter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/list-product/{letter}/{page}/{results_per_page}:
    get:
      tags: [Drug]
      operationId: listProductsByLetterPageAndSize
      summary: List products by first letter, page, and page size
      parameters:
        - $ref: '#/components/parameters/LetterParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/ResultsPerPageParam'
      responses:
        '200':
          description: Product list filtered by first letter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductListItem'
              examples:
                products:
                  $ref: '#/components/examples/ProductListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/products:
    get:
      tags: [Drug]
      operationId: getProductsByName
      summary: Search products by name
      description: Returns grouped generic and brand product matches.
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped product search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameProductsResponse'
              examples:
                products:
                  $ref: '#/components/examples/NameProductsExample'
                empty:
                  $ref: '#/components/examples/EmptyNameProductsExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/generic_products:
    get:
      tags: [Drug]
      operationId: getGenericProductsByName
      summary: Search generic products by name
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped product search result with `brand` bucket empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameProductsResponse'
              examples:
                generic_only:
                  $ref: '#/components/examples/NameProductsGenericOnlyExample'
                empty:
                  $ref: '#/components/examples/EmptyNameProductsExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/brand_products:
    get:
      tags: [Drug]
      operationId: getBrandProductsByName
      summary: Search brand products by name
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped product search result with `generic` bucket empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameProductsResponse'
              examples:
                brand_only:
                  $ref: '#/components/examples/NameProductsBrandOnlyExample'
                empty:
                  $ref: '#/components/examples/EmptyNameProductsExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/packages:
    get:
      tags: [Drug]
      operationId: getPackagesByName
      summary: Search packages by name
      description: Returns grouped generic and brand package matches.
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped package search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamePackagesResponse'
              examples:
                packages:
                  $ref: '#/components/examples/NamePackagesExample'
                empty:
                  $ref: '#/components/examples/EmptyNamePackagesExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/generic_packages:
    get:
      tags: [Drug]
      operationId: getGenericPackagesByName
      summary: Search generic packages by name
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped package search result with `brand` bucket empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamePackagesResponse'
              examples:
                generic_only:
                  $ref: '#/components/examples/NamePackagesGenericOnlyExample'
                empty:
                  $ref: '#/components/examples/EmptyNamePackagesExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/name/{product_name}/brand_packages:
    get:
      tags: [Drug]
      operationId: getBrandPackagesByName
      summary: Search brand packages by name
      parameters:
        - $ref: '#/components/parameters/ProductNameParam'
      responses:
        '200':
          description: Grouped package search result with `generic` bucket empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamePackagesResponse'
              examples:
                brand_only:
                  $ref: '#/components/examples/NamePackagesBrandOnlyExample'
                empty:
                  $ref: '#/components/examples/EmptyNamePackagesExample'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/rxnorm/{rxnorm_id}/products:
    get:
      tags: [Drug]
      operationId: getProductsByRxNorm
      summary: Get products by RxNorm ID
      parameters:
        - $ref: '#/components/parameters/RxnormIdParam'
      responses:
        '200':
          description: Product list with matching RxNorm ID
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              examples:
                products:
                  $ref: '#/components/examples/RxnormProductsExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/rxnorm/{rxnorm_id}/packages:
    get:
      tags: [Drug]
      operationId: getPackagesByRxNorm
      summary: Get packages by RxNorm ID
      parameters:
        - $ref: '#/components/parameters/RxnormIdParam'
      responses:
        '200':
          description: Package list linked to products with matching RxNorm ID
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Package'
              examples:
                packages:
                  $ref: '#/components/examples/RxnormPackagesExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/rxnorm/{rxnorm_id}/conditions:
    get:
      tags: [Drug]
      operationId: getConditionsByRxNorm
      summary: Get condition evidence by RxNorm ID
      description: Returns condition evidence derived from local labels and available clinical terminology relationships.
      parameters:
        - $ref: '#/components/parameters/RxnormIdParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Condition evidence rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DrugConditionEvidence'
              examples:
                conditions:
                  $ref: '#/components/examples/DrugConditionEvidenceListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/ndc/{product_ndc}/conditions:
    get:
      tags: [Drug]
      operationId: getConditionsByProductNdc
      summary: Get condition evidence by product NDC
      description: Returns condition evidence for a product NDC.
      parameters:
        - $ref: '#/components/parameters/ProductNdcParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Condition evidence rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DrugConditionEvidence'
              examples:
                conditions:
                  $ref: '#/components/examples/DrugConditionEvidenceListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

  /api/v1/drug/label/{set_id}/condition-evidence:
    get:
      tags: [Drug]
      operationId: getConditionEvidenceByLabelSetId
      summary: Get condition evidence by SPL Set ID
      parameters:
        - name: set_id
          in: path
          required: true
          description: SPL Set ID from a label record.
          schema:
            type: string
          example: df29577b-c2f0-bea8-b048-7719972707aa
      responses:
        '200':
          description: Condition evidence rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DrugConditionEvidence'
              examples:
                conditions:
                  $ref: '#/components/examples/DrugConditionEvidenceListExample'
        '404':
          $ref: '#/components/responses/NotFoundJson'
        '500':
          $ref: '#/components/responses/InternalErrorJson'

components:
  parameters:
    ProductNdcParam:
      name: product_ndc
      in: path
      required: true
      description: Product NDC code.
      schema:
        type: string
      example: '51662-1407'

    PackageNdcParam:
      name: package_ndc
      in: path
      required: true
      description: Package NDC code.
      schema:
        type: string
      example: '51662-1407-1'

    RxnormIdParam:
      name: rxnorm_id
      in: path
      required: true
      description: RxNorm identifier.
      schema:
        type: string
      example: '992801'

    ProductNameParam:
      name: product_name
      in: path
      required: true
      description: URL-encoded product name; search is case-insensitive.
      schema:
        type: string
      example: aspirin

    LetterParam:
      name: letter
      in: path
      required: true
      description: First-letter filter.
      schema:
        type: string
        pattern: '^[A-Za-z]$'
      example: a

    PageParam:
      name: page
      in: path
      required: true
      description: Zero-based page index. Negative values are accepted and treated as zero by the implementation.
      schema:
        type: integer
      example: 0

    ResultsPerPageParam:
      name: results_per_page
      in: path
      required: true
      description: Maximum records per page.
      schema:
        type: integer
        minimum: 1
      example: 25

    PrefixParam:
      name: prefix
      in: query
      required: false
      description: Parsed by API but currently not applied to output formatting.
      schema:
        type: string
      example: p

    SeparatorParam:
      name: separator
      in: query
      required: false
      description: Parsed by API but currently not applied to output formatting.
      schema:
        type: string
      example: ':'

    SuffixParam:
      name: suffix
      in: query
      required: false
      description: Parsed by API but currently not applied to output formatting.
      schema:
        type: string
      example: s

    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum rows to return.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
      example: 5

  responses:
    NotFoundJson:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundResponse'
          examples:
            not_found:
              $ref: '#/components/examples/NotFoundExample'

    InternalErrorJson:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal_error:
              $ref: '#/components/examples/InternalErrorExample'

  schemas:
    HealthcheckStatus:
      type: object
      required: [date, release, environment, database]
      properties:
        date:
          type: string
          description: UTC timestamp from server.
          example: '2026-02-13T13:37:12.402748'
        release:
          type: string
          nullable: true
          example: dev
        environment:
          type: string
          nullable: true
          example: test
        database:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [OK, Fail]
            details:
              type: string
              nullable: true

    DrugServiceStatus:
      type: object
      required: [date, release, environment, product_count, package_count]
      properties:
        date:
          type: string
          description: UTC timestamp from server.
          example: '2026-02-13T13:37:12.611248'
        release:
          type: string
          nullable: true
          example: dev
        environment:
          type: string
          nullable: true
          example: test
        product_count:
          type: integer
          format: int64
          example: 131196
        package_count:
          type: integer
          format: int64
          example: 244932

    Product:
      type: object
      required: [product_id]
      properties:
        product_ndc:
          type: string
          nullable: true
        generic_name:
          type: string
          nullable: true
        labeler_name:
          type: string
          nullable: true
        brand_name:
          type: string
          nullable: true
        active_ingredients:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        finished:
          type: boolean
          nullable: true
        listing_expiration_date:
          type: string
          nullable: true
          description: Date serialized by API with trailing `Z`.
        openfda:
          type: object
          nullable: true
          additionalProperties: true
        marketing_category:
          type: string
          nullable: true
        is_otc:
          type: boolean
          nullable: true
        dosage_form:
          type: string
          nullable: true
        short_dosage_form:
          type: string
          nullable: true
        spl_id:
          type: string
          nullable: true
        product_type:
          type: string
          nullable: true
        route:
          type: array
          nullable: true
          items:
            type: string
        marketing_start_date:
          type: string
          nullable: true
          description: Date serialized by API with trailing `Z`.
        marketing_end_date:
          type: string
          nullable: true
          description: Date serialized by API with trailing `Z`.
        product_id:
          type: string
        application_number:
          type: string
          nullable: true
        brand_name_base:
          type: string
          nullable: true
        pharm_class:
          type: array
          nullable: true
          items:
            type: string
        dea_schedule:
          type: string
          nullable: true
        rxnorm_ids:
          type: array
          nullable: true
          items:
            type: string

    Package:
      type: object
      required: [package_ndc]
      properties:
        package_ndc:
          type: string
        ndc11:
          type: string
          nullable: true
        product_ndc:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        size:
          type: integer
          format: int64
          nullable: true
        size_extra:
          type: string
          nullable: true
        packages_number:
          type: integer
          format: int64
          nullable: true
        package_format:
          type: string
          nullable: true
        marketing_start_date:
          type: string
          nullable: true
          description: Date serialized by API with trailing `Z`.
        sample:
          type: boolean
          nullable: true

    Label:
      type: object
      description: |
        Label payload. Model supports many optional text fields.
        `set_id` is the SPL Set ID and can be used as key for DailyMed media lookup.
        Media URLs are not part of this schema.
      properties:
        id:
          type: string
          nullable: true
        set_id:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        openfda:
          type: object
          nullable: true
          additionalProperties: true
        product_ndc:
          type: array
          nullable: true
          items:
            type: string
        package_ndc:
          type: array
          nullable: true
          items:
            type: string
      additionalProperties: true

    DrugConditionEvidence:
      type: object
      properties:
        evidence_id:
          type: string
        set_id:
          type: string
          nullable: true
        label_id:
          type: string
          nullable: true
        product_ndc:
